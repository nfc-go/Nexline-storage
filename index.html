<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexLink | R2 Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1200.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --text: #f8fafc; --accent: #f97316; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .upload-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
    </style>
</head>
<body class="p-6 md:p-12 min-h-screen">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12 border-b border-white/10 pb-10">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 upload-gradient rounded-3xl flex items-center justify-center shadow-2xl shadow-orange-500/20">
                    <i data-lucide="shield-check" class="text-white w-9 h-9"></i>
                </div>
                <div>
                    <h1 class="text-4xl font-extrabold tracking-tighter">NexLink</h1>
                    <p class="text-orange-500 font-mono text-xs tracking-[0.3em] uppercase">Private Cloud Storage</p>
                </div>
            </div>
            
            <button onclick="document.getElementById('file-input').click()" class="upload-gradient text-white px-10 py-4 rounded-2xl font-bold flex items-center gap-3 hover:scale-105 active:scale-95 transition-all shadow-xl shadow-orange-600/20">
                <i data-lucide="upload"></i> UPLOAD TO R2
            </button>
            <input type="file" id="file-input" hidden multiple onchange="uploadToR2()">
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-10">
            <div class="glass p-5 rounded-3xl flex flex-col">
                <span class="text-[10px] uppercase tracking-widest opacity-40 mb-1">Bucket</span>
                <span class="font-bold text-orange-400">Nexline</span>
            </div>
            <div class="glass p-5 rounded-3xl flex flex-col">
                <span class="text-[10px] uppercase tracking-widest opacity-40 mb-1">Region</span>
                <span class="font-bold">us-east-1 (R2)</span>
            </div>
            <div class="glass p-5 rounded-3xl flex flex-col">
                <span class="text-[10px] uppercase tracking-widest opacity-40 mb-1">Cost</span>
                <span class="font-bold text-green-400">$0.00 Egress Fees</span>
            </div>
        </div>

        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </div>

    <script>
        // Config from your images
        const R2_CREDENTIALS = {
            accessKeyId: '7b8b9abf52cbc0ee608c45cc7493ea88',
            secretAccessKey: 'fad246eb50f4e0da3b05c55da08e6cda570eea7185a051c962d3a4e0762d6d0a',
            endpoint: 'https://24d79d5b07f5051f2f201553fcbebbce.r2.cloudflarestorage.com',
            bucketName: 'Nexline'
        };

        const s3 = new AWS.S3({
            accessKeyId: R2_CREDENTIALS.accessKeyId,
            secretAccessKey: R2_CREDENTIALS.secretAccessKey,
            endpoint: new AWS.Endpoint(R2_CREDENTIALS.endpoint),
            signatureVersion: 'v4',
            s3ForcePathStyle: true, // Required for R2
            region: 'us-east-1'    // Fixed from your networking error
        });

        let uploadedFiles = [];
        lucide.createIcons();

        async function uploadToR2() {
            const files = document.getElementById('file-input').files;
            if (!files.length) return;

            for (let file of files) {
                const fileName = `nexlink-${Date.now()}-${file.name}`;
                try {
                    console.log("Starting upload...");
                    
                    await s3.putObject({
                        Bucket: R2_CREDENTIALS.bucketName,
                        Key: fileName,
                        Body: file,
                        ContentType: file.type
                    }).promise();

                    const url = s3.getSignedUrl('getObject', {
                        Bucket: R2_CREDENTIALS.bucketName,
                        Key: fileName,
                        Expires: 3600
                    });

                    uploadedFiles.push({ name: file.name, url: url, type: file.type });
                    updateUI();
                } catch (err) {
                    console.error(err);
                    alert("Error: " + err.message + "\n\nMake sure CORS is enabled in Cloudflare Settings.");
                }
            }
        }

        function updateUI() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            uploadedFiles.forEach(file => {
                const isImage = file.type.startsWith('image/');
                const div = document.createElement('div');
                div.className = "glass p-3 rounded-[2rem] animate-in fade-in slide-in-from-bottom-4 duration-500 hover:border-orange-500/40 transition-all group";
                div.innerHTML = `
                    <div class="h-40 bg-white/5 rounded-3xl mb-4 flex items-center justify-center overflow-hidden">
                        ${isImage ? `<img src="${file.url}" crossorigin="anonymous" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">` 
                                  : `<i data-lucide="file-text" class="text-orange-500 w-12 h-12 opacity-40"></i>`}
                    </div>
                    <p class="text-[10px] font-bold truncate text-center opacity-50 px-2 pb-2 uppercase tracking-tighter">${file.name}</p>
                `;
                grid.appendChild(div);
            });
            lucide.createIcons();
        }
    </script>
</body>
</html>
